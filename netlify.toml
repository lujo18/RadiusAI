[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NODE_ENV = "production"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect trailing slashes to non-trailing
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = false

# Proxy to external API
[[redirects]]
  from = "/api/brand/*"
  to = "https://api.useradius.app/brand/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/generate/*"
  to = "https://api.useradius.app/generate/:splat"
  status = 200
  force = true

[context.production.environment]
  NEXT_PUBLIC_API_URL = "https://api.useradius.app"
  NEXT_PUBLIC_BASE_URL = "https://useradius.app"
  NODE_VERSION = "22"
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NEXT_PUBLIC_API_URL = "https://api-preview.useradius.app"
  NEXT_PUBLIC_BASE_URL = "https://preview-useradius.app"
  NODE_VERSION = "22"

[context.branch-deploy.environment]
  NODE_VERSION = "22"