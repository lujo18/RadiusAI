name: Deploy Backend to Digital Ocean

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: radius-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to DigitalOcean Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DO_API_TOKEN }}
          password: ${{ secrets.DO_API_TOKEN }}
      
      - name: Extract version
        id: meta
        run: |
          echo "VERSION=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/radius/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/radius/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.VERSION }}
            ${{ env.REGISTRY }}/radius/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SHA_SHORT }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/radius/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline
      
      - name: Trigger Digital Ocean App Deployment
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"deployment": {"force": true}}' \
            https://api.digitalocean.com/v2/apps/${{ secrets.DO_APP_ID }}/deployments
        continue-on-error: true
      
      - name: Notify Deployment
        if: always()
        run: |
          echo "Backend deployment status: ${{ job.status }}"
