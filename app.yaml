name: radius-backend
services:
- name: api
  github:
    repo: your-github-username/radius
    branch: main
  build_command: pip install -r requirements.txt
  source_dir: backend
  http_port: 8000
  envs:
  - key: ENV
    value: production
  - key: GEMINI_API_KEY
    scope: RUN_TIME
    value: ${GEMINI_API_KEY}
  - key: SUPABASE_URL
    scope: RUN_TIME
    value: ${SUPABASE_URL}
  - key: SUPABASE_SERVICE_ROLE_KEY
    scope: RUN_TIME
    value: ${SUPABASE_SERVICE_ROLE_KEY}
  - key: SUPABASE_JWT_SECRET
    scope: RUN_TIME
    value: ${SUPABASE_JWT_SECRET}
  - key: STRIPE_SECRET_KEY
    scope: RUN_TIME
    value: ${STRIPE_SECRET_KEY}
  - key: STRIPE_WEBHOOK_SECRET
    scope: RUN_TIME
    value: ${STRIPE_WEBHOOK_SECRET}
  - key: POST_FOR_ME_API_KEY
    scope: RUN_TIME
    value: ${POST_FOR_ME_API_KEY}
  - key: LATE_API_KEY
    scope: RUN_TIME
    value: ${LATE_API_KEY}
  - key: GROQ_API_KEY
    scope: RUN_TIME
    value: ${GROQ_API_KEY}
  - key: TIKTOK_CLIENT_KEY
    scope: RUN_TIME
    value: ${TIKTOK_CLIENT_KEY}
  - key: TIKTOK_CLIENT_SECRET
    scope: RUN_TIME
    value: ${TIKTOK_CLIENT_SECRET}
  - key: STATE_SECRET_KEY
    scope: RUN_TIME
    value: ${STATE_SECRET_KEY}
  - key: FRONTEND_URL
    scope: RUN_TIME
    value: ${FRONTEND_URL}
  - key: BACKEND_URL
    scope: RUN_TIME
    value: ${BACKEND_URL}
  run_command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
  health_check:
    http_path: /health
